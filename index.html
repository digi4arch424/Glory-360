<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glory360</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600&display=swap');
 
  :root {
    --bg: #1C1C1C;
    --surface: #252525;
    --border: #3a3530;
    --accent: #C8A96A;
    --accent2: #d9c08e;
    --text: #EAEAEA;
    --muted: #8a8272;
    --danger: #cc5555;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
 
  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 100;
    flex-shrink: 0;
  }
 
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
 
  /* Mode pill toggle */
  #mode-pill {
    display: none;
    align-items: center;
    gap: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;
  }
  #mode-pill.visible { display: flex; }
 
  .pill-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 5px 11px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .pill-btn.active {
    background: var(--accent);
    color: #1C1C1C;
  }
 
  /* ── Viewer Area ── */
  #viewer-wrap {
    flex: 1 1 0;
    position: relative;
    overflow: hidden;
    min-height: 0;
    width: 100%;
  }
 
  #panorama {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: none;
  }
  #panorama.active { display: block; }
 
  .pnlm-container { width: 100% !important; height: 100% !important; }
 
  #flat-viewer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: none;
    cursor: grab;
    background: #000;
    touch-action: none;
  }
  #flat-viewer.active { display: block; }
  #flat-viewer:active { cursor: grabbing; }
 
  /* ── Landing ── */
  #landing {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: var(--bg);
    z-index: 10;
    transition: opacity 0.4s ease;
    padding: 24px;
  }
  #landing.hidden { opacity: 0; pointer-events: none; }
 
  .globe-ring {
    width: 110px;
    height: 110px;
    animation: spin 12s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .globe-ring svg { width: 100%; height: 100%; }
 
  .landing-text { text-align: center; }
  .landing-text h2 { font-size: 21px; font-weight: 600; margin-bottom: 10px; }
  .landing-text p { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 280px; margin: 0 auto; }
 
  .open-btns {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
 
  .upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--accent);
    color: #1C1C1C;
    border: none;
    border-radius: 4px;
    padding: 13px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .upload-btn.outline {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .upload-btn:active { transform: scale(0.97); }
  .upload-btn:hover { box-shadow: 0 0 20px 2px rgba(200,169,106,0.25); }
 
  #file-input-sphere, #file-input-flat { display: none; }
 
  /* ── Bottom Controls ── */
  #controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #controls::-webkit-scrollbar { display: none; }
 
  .ctrl-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 8px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .ctrl-btn:hover, .ctrl-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
 
  .ctrl-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
 
  /* Hide sphere-only buttons in flat mode */
  body.mode-flat .sphere-only { display: none; }
 
  #filename-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
    flex-shrink: 1;
  }
 
  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 76px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 18px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
  /* ── Pannellum overrides ── */
  .pnlm-ui { user-select: none; }
  .pnlm-container { background: var(--bg) !important; }
  .pnlm-load-box { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 4px !important; }
  .pnlm-lbar { background: var(--accent) !important; }
  .pnlm-lmsg { color: var(--muted) !important; font-family: 'Space Mono', monospace !important; font-size: 12px !important; }
  .pnlm-controls { display: none !important; }
</style>
</head>
<body>
 
<header>
  <div class="logo">GLORY<span>360</span></div>
  <div id="mode-pill">
    <button class="pill-btn active" id="pill-sphere">⬤ SPHERE</button>
    <button class="pill-btn" id="pill-flat">▬ FLAT PAN</button>
  </div>
</header>
 
<div id="viewer-wrap">
  <div id="panorama"></div>
  <canvas id="flat-viewer"></canvas>
 
  <div id="landing">
    <div class="globe-ring">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="54" stroke="#3a3530" stroke-width="1"/>
        <circle cx="60" cy="60" r="54" stroke="#C8A96A" stroke-width="1.5"
          stroke-dasharray="60 280" stroke-linecap="round"/>
        <ellipse cx="60" cy="60" rx="24" ry="54" stroke="#3a3530" stroke-width="1"/>
        <ellipse cx="60" cy="60" rx="24" ry="54" stroke="#d9c08e" stroke-width="1"
          stroke-dasharray="30 160" stroke-dashoffset="40" stroke-linecap="round"/>
        <line x1="6" y1="60" x2="114" y2="60" stroke="#3a3530" stroke-width="1"/>
        <circle cx="60" cy="60" r="4" fill="#C8A96A"/>
      </svg>
    </div>
 
    <div class="landing-text">
      <h2>Load a Panorama</h2>
      <p>
        Use <strong style="color:var(--accent)">Sphere 360°</strong> for equirectangular images.<br>
        Use <strong style="color:var(--accent)">Flat Pan</strong> for phone panorama shots — no warping.
      </p>
    </div>
 
    <div class="open-btns">
      <label class="upload-btn" for="file-input-sphere">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
          <line x1="21.17" y1="8" x2="11.99" y2="8"/>
          <line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
          <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
        </svg>
        SPHERE 360°
      </label>
      <label class="upload-btn outline" for="file-input-flat">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="2" y="7" width="20" height="10" rx="1"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
        </svg>
        FLAT PAN
      </label>
    </div>
 
    <input type="file" id="file-input-sphere" accept="image/*">
    <input type="file" id="file-input-flat" accept="image/*">
  </div>
</div>
 
<div id="controls">
  <label class="ctrl-btn sphere-only" for="file-input-sphere" title="Open equirectangular panorama">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
    </svg>
    SPHERE
  </label>
  <label class="ctrl-btn" for="file-input-flat" title="Open flat phone panorama">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="7" width="20" height="10" rx="1"/>
    </svg>
    FLAT
  </label>
 
  <div class="ctrl-sep"></div>
 
  <button class="ctrl-btn sphere-only" id="btn-autorotate">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    AUTO
  </button>
 
  <button class="ctrl-btn" id="btn-reset">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="16 12 12 8 8 12"/>
      <line x1="12" y1="16" x2="12" y2="8"/>
    </svg>
    RESET
  </button>
 
  <button class="ctrl-btn" id="btn-fullscreen">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 3 21 3 21 9"/>
      <polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/>
      <line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
    FULL
  </button>
 
  <div class="ctrl-sep"></div>
  <span id="filename-label">—</span>
</div>
 
<div id="toast"></div>
 
<script>
// ── State ──────────────────────────────────────────────────────────────────
let sphereViewer = null;
let autoRotating = false;
let currentMode  = 'sphere';
 
// Flat pan
let flatImg  = null;
let flatOffX = 0, flatOffY = 0, flatScale = 1;
let flatDragging = false, flatLastX = 0, flatLastY = 0;
let flatPinchDist0 = 0, flatScale0 = 1;
let flatAnimId = null, flatVelX = 0, flatVelY = 0;
 
// ── Elements ───────────────────────────────────────────────────────────────
const landing       = document.getElementById('landing');
const panoramaDiv   = document.getElementById('panorama');
const flatCanvas    = document.getElementById('flat-viewer');
const ctx           = flatCanvas.getContext('2d');
const fileInputSph  = document.getElementById('file-input-sphere');
const fileInputFlat = document.getElementById('file-input-flat');
const filenameLabel = document.getElementById('filename-label');
const btnAutorotate = document.getElementById('btn-autorotate');
const btnFullscreen = document.getElementById('btn-fullscreen');
const btnReset      = document.getElementById('btn-reset');
const modePill      = document.getElementById('mode-pill');
const pillSphere    = document.getElementById('pill-sphere');
const pillFlat      = document.getElementById('pill-flat');
 
// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, ms = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
 
function setFilename(name) {
  filenameLabel.textContent = name.length > 24 ? name.slice(0, 22) + '…' : name;
}
 
// ── Mode switching ─────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  if (mode === 'sphere') {
    panoramaDiv.classList.add('active');
    flatCanvas.classList.remove('active');
    document.body.classList.remove('mode-flat');
    pillSphere.classList.add('active');
    pillFlat.classList.remove('active');
  } else {
    panoramaDiv.classList.remove('active');
    flatCanvas.classList.add('active');
    document.body.classList.add('mode-flat');
    pillFlat.classList.add('active');
    pillSphere.classList.remove('active');
  }
}
 
pillSphere.addEventListener('click', () => {
  if (currentMode === 'sphere') return;
  stopFlat(); destroySphere();
  setMode('sphere');
  landing.classList.remove('hidden');
  filenameLabel.textContent = '—';
});
 
pillFlat.addEventListener('click', () => {
  if (currentMode === 'flat') return;
  destroySphere(); stopFlat();
  setMode('flat');
  landing.classList.remove('hidden');
  filenameLabel.textContent = '—';
});
 
// ── Sphere (Pannellum) ─────────────────────────────────────────────────────
function destroySphere() {
  if (sphereViewer) { sphereViewer.destroy(); sphereViewer = null; }
  autoRotating = false;
  btnAutorotate.classList.remove('active');
}
 
fileInputSph.addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Please select an image file.'); return; }
  stopFlat(); destroySphere();
  setMode('sphere');
  modePill.classList.add('visible');
  setFilename(file.name);
 
  const url = URL.createObjectURL(file);
  sphereViewer = pannellum.viewer('panorama', {
    type: 'equirectangular',
    panorama: url,
    autoLoad: true,
    showZoomCtrl: false,
    showFullscreenCtrl: false,
    showControls: false,
    compass: false,
    hfov: 90, minHfov: 40, maxHfov: 120,
    mouseZoom: true,
    touchPanSpeedCoeffFactor: 1.2,
  });
  sphereViewer.on('load', () => {
    URL.revokeObjectURL(url);
    landing.classList.add('hidden');
    window.dispatchEvent(new Event('resize'));
    showToast('Drag to look around · Scroll to zoom');
  });
  sphereViewer.on('error', () => showToast('Could not load panorama.'));
  fileInputSph.value = '';
});
 
btnAutorotate.addEventListener('click', () => {
  if (!sphereViewer) { showToast('Load a sphere panorama first.'); return; }
  autoRotating = !autoRotating;
  if (autoRotating) { sphereViewer.startAutoRotate(-2); btnAutorotate.classList.add('active'); showToast('Auto-rotate ON'); }
  else              { sphereViewer.stopAutoRotate();    btnAutorotate.classList.remove('active'); showToast('Auto-rotate OFF'); }
});
 
// ── Flat Pan (Canvas) ──────────────────────────────────────────────────────
function resizeCanvas() {
  const wrap = document.getElementById('viewer-wrap');
  flatCanvas.width  = wrap.clientWidth;
  flatCanvas.height = wrap.clientHeight;
  if (flatImg) { clampFlat(); drawFlat(); }
}
 
function initFlat(img) {
  // Fit image so its height fills the canvas, centred horizontally
  flatScale = flatCanvas.height / img.height;
  flatOffX  = (flatCanvas.width  - img.width  * flatScale) / 2;
  flatOffY  = 0;
  flatVelX  = 0; flatVelY = 0;
  drawFlat();
}
 
function clampFlat() {
  if (!flatImg) return;
  const iw = flatImg.width  * flatScale;
  const ih = flatImg.height * flatScale;
  const cw = flatCanvas.width, ch = flatCanvas.height;
  flatOffX = iw <= cw ? (cw - iw) / 2 : Math.min(0, Math.max(cw - iw, flatOffX));
  flatOffY = ih <= ch ? (ch - ih) / 2 : Math.min(0, Math.max(ch - ih, flatOffY));
}
 
function drawFlat() {
  if (!flatImg) return;
  ctx.clearRect(0, 0, flatCanvas.width, flatCanvas.height);
  ctx.drawImage(flatImg, flatOffX, flatOffY, flatImg.width * flatScale, flatImg.height * flatScale);
}
 
function momentumLoop() {
  flatVelX *= 0.92; flatVelY *= 0.92;
  if (Math.abs(flatVelX) < 0.3 && Math.abs(flatVelY) < 0.3) { flatAnimId = null; return; }
  flatOffX += flatVelX; flatOffY += flatVelY;
  clampFlat(); drawFlat();
  flatAnimId = requestAnimationFrame(momentumLoop);
}
 
function stopFlat() {
  if (flatAnimId) { cancelAnimationFrame(flatAnimId); flatAnimId = null; }
  flatImg = null;
  ctx.clearRect(0, 0, flatCanvas.width, flatCanvas.height);
}
 
fileInputFlat.addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Please select an image file.'); return; }
  destroySphere(); stopFlat();
  setMode('flat');
  modePill.classList.add('visible');
  setFilename(file.name);
 
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    flatImg = img;
    resizeCanvas();
    initFlat(img);
    landing.classList.add('hidden');
    showToast('Drag to pan · Pinch or scroll to zoom');
  };
  img.onerror = () => showToast('Could not load image.');
  img.src = url;
  fileInputFlat.value = '';
});
 
// Mouse drag
flatCanvas.addEventListener('mousedown', (e) => {
  if (!flatImg) return;
  flatDragging = true;
  flatLastX = e.clientX; flatLastY = e.clientY;
  if (flatAnimId) { cancelAnimationFrame(flatAnimId); flatAnimId = null; }
  flatVelX = 0; flatVelY = 0;
});
window.addEventListener('mousemove', (e) => {
  if (!flatDragging || !flatImg) return;
  const dx = e.clientX - flatLastX, dy = e.clientY - flatLastY;
  flatVelX = dx; flatVelY = dy;
  flatOffX += dx; flatOffY += dy;
  flatLastX = e.clientX; flatLastY = e.clientY;
  clampFlat(); drawFlat();
});
window.addEventListener('mouseup', () => {
  if (!flatDragging) return;
  flatDragging = false;
  if (Math.abs(flatVelX) > 1 || Math.abs(flatVelY) > 1)
    flatAnimId = requestAnimationFrame(momentumLoop);
});
 
// Scroll to zoom
flatCanvas.addEventListener('wheel', (e) => {
  if (!flatImg) return;
  e.preventDefault();
  const rect = flatCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const minS = Math.min(flatCanvas.width / flatImg.width, flatCanvas.height / flatImg.height) * 0.8;
  const newS = Math.min(8, Math.max(minS, flatScale * factor));
  const r = newS / flatScale;
  flatOffX = mx - r * (mx - flatOffX);
  flatOffY = my - r * (my - flatOffY);
  flatScale = newS;
  clampFlat(); drawFlat();
}, { passive: false });
 
// Touch drag + pinch
flatCanvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!flatImg) return;
  if (flatAnimId) { cancelAnimationFrame(flatAnimId); flatAnimId = null; }
  flatVelX = 0; flatVelY = 0;
  if (e.touches.length === 1) {
    flatDragging = true;
    flatLastX = e.touches[0].clientX; flatLastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    flatDragging = false;
    flatPinchDist0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    flatScale0 = flatScale;
  }
}, { passive: false });
 
flatCanvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!flatImg) return;
  if (e.touches.length === 1 && flatDragging) {
    const dx = e.touches[0].clientX - flatLastX, dy = e.touches[0].clientY - flatLastY;
    flatVelX = dx; flatVelY = dy;
    flatOffX += dx; flatOffY += dy;
    flatLastX = e.touches[0].clientX; flatLastY = e.touches[0].clientY;
    clampFlat(); drawFlat();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const rect = flatCanvas.getBoundingClientRect();
    const cx = midX - rect.left, cy = midY - rect.top;
    const minS = Math.min(flatCanvas.width / flatImg.width, flatCanvas.height / flatImg.height) * 0.8;
    const newS = Math.min(8, Math.max(minS, flatScale0 * (dist / flatPinchDist0)));
    const r = newS / flatScale;
    flatOffX = cx - r * (cx - flatOffX);
    flatOffY = cy - r * (cy - flatOffY);
    flatScale = newS;
    clampFlat(); drawFlat();
  }
}, { passive: false });
 
flatCanvas.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) {
    flatDragging = false;
    if (Math.abs(flatVelX) > 1 || Math.abs(flatVelY) > 1)
      flatAnimId = requestAnimationFrame(momentumLoop);
  }
});
 
// ── Shared controls ────────────────────────────────────────────────────────
btnReset.addEventListener('click', () => {
  if (currentMode === 'sphere' && sphereViewer) {
    sphereViewer.lookAt(0, 0, 90, 800);
  } else if (currentMode === 'flat' && flatImg) {
    if (flatAnimId) cancelAnimationFrame(flatAnimId);
    flatVelX = 0; flatVelY = 0;
    resizeCanvas(); initFlat(flatImg);
    showToast('View reset');
  }
});
 
btnFullscreen.addEventListener('click', () => {
  if (!document.fullscreenElement)
    document.documentElement.requestFullscreen().catch(() => showToast('Fullscreen not available'));
  else
    document.exitFullscreen();
});
 
document.addEventListener('fullscreenchange', () => {
  btnFullscreen.classList.toggle('active', !!document.fullscreenElement);
  if (currentMode === 'flat' && flatImg) setTimeout(() => { resizeCanvas(); }, 100);
});
 
window.addEventListener('resize', () => {
  if (currentMode === 'flat' && flatImg) resizeCanvas();
});
</script>
</body>
</html>
