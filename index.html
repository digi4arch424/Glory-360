<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1C1C1C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Glory360">
  <title>Glory360</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">G</div>
    <div class="logo-text">
      <div class="eyebrow">Glory360</div>
      <h1>Virtual Tours</h1>
    </div>
  </div>
  <div class="nav-actions">
    <button class="btn-ghost" id="import-btn" style="min-height:44px;padding:0 14px">&#8679; Import</button>
  </div>
</header>

<main class="page-content">
  <div class="panel">
    <h2>New Project</h2>
    <div class="inline-form">
      <div>
        <label for="project-name">Project name</label>
        <input id="project-name" type="text" placeholder="e.g. Office walkthrough" autocomplete="off">
      </div>
      <button id="create-project-btn" style="align-self:end;min-height:48px">+ Create</button>
    </div>
  </div>

  <div class="panel">
    <div class="section-heading">
      <h2>Projects</h2>
      <span id="project-count" class="badge">0 saved</span>
    </div>
    <div id="project-list" class="project-list"></div>
  </div>
</main>

<!-- Import Modal -->
<div id="import-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h2>Import Project</h2>
    <p class="muted">Select a <strong style="color:var(--gold)">.glory360</strong> file exported from Glory360.</p>
    <div class="import-drop" id="import-drop">
      <input type="file" id="import-file" accept=".glory360,application/json">
      <div style="font-size:1.8rem;color:var(--gold);margin-bottom:8px">&#128194;</div>
      <div style="font-size:.85rem;color:var(--light-dim)">Tap to choose a .glory360 file</div>
      <div class="upload-fn" id="import-fn" style="display:none"></div>
    </div>
    <div id="import-msg" style="display:none;font-size:.82rem"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="import-cancel-btn">Cancel</button>
      <button id="import-confirm-btn" disabled>Import</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
