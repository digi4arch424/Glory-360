<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glory360</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/pannellum.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap');
 
:root {
  --bg:      #1C1C1C;
  --surface: #252525;
  --surface2:#2e2e2e;
  --border:  #3a3530;
  --gold:    #C8A96A;
  --gold2:   #e0c488;
  --text:    #EAEAEA;
  --muted:   #8a8272;
  --danger:  #cc5555;
  --radius:  6px;
}
 
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; width:100%; overflow:hidden; }
 
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
 
/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  min-height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 200;
  flex-shrink: 0;
}
 
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gold);
}
.logo span { color: var(--text); }
 
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
 
.back-btn {
  display: none;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  padding: 6px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }
.back-btn.visible { display: flex; }
 
.breadcrumb {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
}
.breadcrumb .sep { margin: 0 6px; }
.breadcrumb .crumb-project { color: var(--text); }
 
/* ─── MAIN AREA ─── */
#main {
  flex: 1 1 0;
  min-height: 0;
  position: relative;
  overflow: hidden;
}
 
/* ─── SCREENS ─── */
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}
 
/* ─── HOME SCREEN ─── */
#screen-home {
  padding: 28px 24px;
}
 
.home-section-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-bottom: 16px;
  text-transform: uppercase;
}
 
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}
 
/* New project card */
.card-new {
  aspect-ratio: 4/3;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  background: transparent;
  color: var(--muted);
  position: relative;
}
.card-new:hover {
  border-color: var(--gold);
  background: rgba(200,169,106,0.04);
  color: var(--gold);
}
.card-new .plus-box {
  width: 48px;
  height: 48px;
  border: 2px solid currentColor;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s;
}
.card-new:hover .plus-box { transform: scale(1.08); }
.card-new .plus-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
}
 
/* Project card */
.card-project {
  aspect-ratio: 4/3;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--surface);
  transition: border-color .2s, transform .15s;
  display: flex;
  flex-direction: column;
}
.card-project:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
}
.card-thumb {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  position: relative;
  background: var(--surface2);
}
.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-thumb-empty {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-thumb-empty svg { opacity: 0.18; }
 
.card-info {
  padding: 8px 10px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}
.card-name {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
  margin-bottom: 2px;
}
.card-meta {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.05em;
}
 
.card-del {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  border-radius: 3px;
  background: rgba(28,28,28,0.85);
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s, color .15s, border-color .15s;
  z-index: 5;
}
.card-project:hover .card-del { opacity: 1; }
.card-del:hover { color: var(--danger); border-color: var(--danger); }
 
/* ─── PROJECT SCREEN ─── */
#screen-project {
  padding: 24px;
}
 
.project-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
 
.project-title-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 18px;
  font-weight: 600;
  outline: none;
  padding: 4px 0;
  flex: 1;
  min-width: 120px;
  transition: border-color .2s;
}
.project-title-input:focus { border-color: var(--gold); }
 
.toolbar-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  padding: 8px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.06em;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .2s, color .2s, background .2s;
  flex-shrink: 0;
}
.toolbar-btn:hover, .toolbar-btn.gold {
  border-color: var(--gold);
  color: var(--gold);
}
.toolbar-btn.filled {
  background: var(--gold);
  border-color: var(--gold);
  color: #1C1C1C;
  font-weight: 700;
}
.toolbar-btn.filled:hover { background: var(--gold2); border-color: var(--gold2); }
 
/* image grid inside project */
.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
 
.img-card {
  aspect-ratio: 4/3;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--surface);
  transition: border-color .2s, transform .15s;
}
.img-card:hover { border-color: var(--gold); transform: translateY(-2px); }
.img-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.img-badge {
  position: absolute;
  top: 6px;
  left: 6px;
  padding: 2px 7px;
  border-radius: 3px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.07em;
  font-weight: 700;
  background: rgba(28,28,28,0.85);
  border: 1px solid var(--border);
}
.img-badge.b360 { color: var(--gold); border-color: rgba(200,169,106,0.4); }
.img-badge.bpano { color: #7ec8e3; border-color: rgba(126,200,227,0.4); }
 
.img-del {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 24px;
  height: 24px;
  border-radius: 3px;
  background: rgba(28,28,28,0.85);
  border: 1px solid var(--border);
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity .15s, color .15s;
}
.img-card:hover .img-del { opacity: 1; }
.img-del:hover { color: var(--danger); }
 
.img-name {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(28,28,28,0.9));
  padding: 18px 8px 6px;
  font-size: 10px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0;
  transition: opacity .2s;
}
.img-card:hover .img-name { opacity: 1; }
 
/* add-image card inside project */
.card-add-img {
  aspect-ratio: 4/3;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  color: var(--muted);
  transition: border-color .2s, background .2s, color .2s;
  position: relative;
}
.card-add-img:hover {
  border-color: var(--gold);
  background: rgba(200,169,106,0.04);
  color: var(--gold);
}
.card-add-img .plus-box {
  width: 40px;
  height: 40px;
  border: 2px solid currentColor;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s;
}
.card-add-img:hover .plus-box { transform: scale(1.1); }
.card-add-img .plus-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.09em;
}
 
/* ─── VIEWER SCREEN ─── */
#screen-viewer {
  background: var(--bg);
}
 
#pannellum-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
 
#pano-canvas-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  cursor: grab;
  display: none;
}
#pano-canvas-container.active { display: block; }
#pano-canvas-container:active { cursor: grabbing; }
#pano-canvas { display: block; }
 
.viewer-controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 50;
}
 
.v-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(28,28,28,0.85);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  padding: 8px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .2s, color .2s;
  backdrop-filter: blur(8px);
}
.v-btn:hover, .v-btn.active { border-color: var(--gold); color: var(--gold); }
.v-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
 
.v-counter {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  white-space: nowrap;
  min-width: 42px;
  text-align: center;
}
 
.v-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}
 
/* ─── MODALS ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 900;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
 
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px;
  width: min(380px, 90vw);
  display: flex;
  flex-direction: column;
  gap: 20px;
  transform: translateY(12px);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
 
.modal-title {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
}
 
.modal-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
.modal-input:focus { border-color: var(--gold); }
 
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
 
.modal-btn {
  padding: 9px 20px;
  border-radius: var(--radius);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  transition: border-color .2s, color .2s;
}
.modal-btn:hover { border-color: var(--gold); color: var(--gold); }
.modal-btn.primary {
  background: var(--gold);
  border-color: var(--gold);
  color: #1C1C1C;
}
.modal-btn.primary:hover { background: var(--gold2); border-color: var(--gold2); }
 
/* add-image type modal */
.type-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.type-opt {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.type-opt:hover { border-color: var(--gold); background: rgba(200,169,106,0.06); }
.type-opt svg { color: var(--gold); }
.type-opt .type-name {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  color: var(--text);
}
.type-opt .type-desc {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  line-height: 1.5;
}
 
/* ─── TOAST ─── */
#toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 18px;
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  color: var(--muted);
  opacity: 0;
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 
/* ─── PANNELLUM OVERRIDES ─── */
.pnlm-ui { user-select: none; }
.pnlm-container { background: var(--bg) !important; }
.pnlm-load-box { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 4px !important; }
.pnlm-lbar { background: var(--gold) !important; }
.pnlm-lmsg { color: var(--muted) !important; font-family: 'Space Mono', monospace !important; font-size: 11px !important; }
.pnlm-controls { display: none !important; }
 
/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
 
<!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
<header>
  <div class="logo">GLORY<span>360</span></div>
  <div class="header-right">
    <div class="breadcrumb" id="breadcrumb"></div>
    <button class="back-btn" id="btn-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      BACK
    </button>
  </div>
</header>
 
<!-- ═══════════════════════════════ MAIN ═══════════════════════════════ -->
<div id="main">
 
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <p class="home-section-title">Projects</p>
    <div class="project-grid" id="project-grid">
      <!-- Cards rendered by JS -->
    </div>
  </div>
 
  <!-- PROJECT -->
  <div class="screen" id="screen-project">
    <div class="project-toolbar">
      <input class="project-title-input" id="project-title-input" type="text" placeholder="Project name…" maxlength="48">
      <button class="toolbar-btn filled" id="btn-add-image">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ADD IMAGE
      </button>
    </div>
    <div class="image-grid" id="image-grid"></div>
  </div>
 
  <!-- VIEWER -->
  <div class="screen" id="screen-viewer">
    <div id="pannellum-container"></div>
    <div id="pano-canvas-container">
      <canvas id="pano-canvas"></canvas>
    </div>
    <div class="viewer-controls" id="viewer-controls">
      <button class="v-btn" id="btn-prev-img" title="Previous image">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        PREV
      </button>
      <span class="v-counter" id="v-counter">—</span>
      <button class="v-btn" id="btn-next-img" title="Next image">
        NEXT
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="v-sep"></div>
      <button class="v-btn" id="btn-autorotate">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        AUTO
      </button>
      <button class="v-btn" id="btn-reset-view">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 12 12 8 8 12"/><line x1="12" y1="16" x2="12" y2="8"/></svg>
        RESET
      </button>
      <button class="v-btn" id="btn-fullscreen">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        FULL
      </button>
    </div>
  </div>
 
</div>
 
<!-- ═══════════════════════════════ MODALS ═══════════════════════════════ -->
 
<!-- New Project Modal -->
<div class="modal-overlay" id="modal-new-project">
  <div class="modal">
    <div class="modal-title">NEW PROJECT</div>
    <input class="modal-input" id="new-project-name" type="text" placeholder="Enter project name…" maxlength="48">
    <div class="modal-actions">
      <button class="modal-btn" id="btn-cancel-project">CANCEL</button>
      <button class="modal-btn primary" id="btn-confirm-project">CREATE</button>
    </div>
  </div>
</div>
 
<!-- Add Image Type Modal -->
<div class="modal-overlay" id="modal-add-image">
  <div class="modal">
    <div class="modal-title">ADD IMAGE</div>
    <div class="type-options">
      <div class="type-opt" id="opt-360">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <ellipse cx="12" cy="12" rx="4" ry="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
        <div class="type-name">360° SPHERE</div>
        <div class="type-desc">Equirectangular image for full spherical view</div>
      </div>
      <div class="type-opt" id="opt-pano">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <path d="M2 10h20M2 14h20"/>
          <circle cx="6" cy="12" r="1" fill="currentColor"/>
          <circle cx="18" cy="12" r="1" fill="currentColor"/>
        </svg>
        <div class="type-name">PANORAMA</div>
        <div class="type-desc">Wide-angle pano photo, no warping</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" id="btn-cancel-image">CANCEL</button>
    </div>
  </div>
</div>
 
<!-- Hidden file inputs -->
<input type="file" id="file-360" accept="image/*" style="display:none">
<input type="file" id="file-pano" accept="image/*" style="display:none">
 
<!-- Toast -->
<div id="toast"></div>
 
<script>
// ════════════════════════════════════════════════════════
//  DB — IndexedDB for image blobs, localStorage for meta
// ════════════════════════════════════════════════════════
const DB_NAME = 'Glory360DB', DB_VER = 1, STORE = 'images';
let db;
 
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
function dbPut(key, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
function dbGet(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
function dbDel(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
 
// Convert blob → data URL (more reliable than createObjectURL for IndexedDB blobs)
function blobToDataURL(blob) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.onerror = () => rej(reader.error);
    reader.readAsDataURL(blob);
  });
}
 
// ════════════════════════════════════════════════════════
//  PROJECT STORE (localStorage meta)
// ════════════════════════════════════════════════════════
function loadProjects() {
  try { return JSON.parse(localStorage.getItem('glory360_projects') || '[]'); }
  catch { return []; }
}
function saveProjects(arr) {
  localStorage.setItem('glory360_projects', JSON.stringify(arr));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
 
// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let projects = [];
let currentProjectId = null;
let currentScreen = 'home';
let pannellumViewer = null;
let autoRotating = false;
let blobURLs = {};
let panoAbort = null; // AbortController to clean up pano event listeners
let currentImageIndex = -1; // index of currently viewed image within project
 
// pano canvas state
let panoImg = null, panoScale = 1, panoOffX = 0, panoOffY = 0;
let panoIsDragging = false, panoDragStart = {x:0,y:0}, panoDragOrigin = {x:0,y:0};
let panoVelX = 0, panoVelY = 0, panoRaf = null;
let panoLastPos = {x:0,y:0}, panoLastTime = 0;
 
// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
function toast(msg, dur = 2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}
 
// ════════════════════════════════════════════════════════
//  SCREEN ROUTING
// ════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
 
  const backBtn = document.getElementById('btn-back');
  const breadcrumb = document.getElementById('breadcrumb');
 
  if (name === 'home') {
    backBtn.classList.remove('visible');
    breadcrumb.innerHTML = '';
    teardownViewer();
  } else if (name === 'project') {
    backBtn.classList.add('visible');
    const p = projects.find(x => x.id === currentProjectId);
    breadcrumb.innerHTML = `<span class="crumb-project">${p ? escHtml(p.name) : 'Project'}</span>`;
    teardownViewer();
  } else if (name === 'viewer') {
    backBtn.classList.add('visible');
    const p = projects.find(x => x.id === currentProjectId);
    breadcrumb.innerHTML = `<span>${p ? escHtml(p.name) : ''}</span><span class="sep">›</span><span class="crumb-project">Viewing</span>`;
  }
}
 
document.getElementById('btn-back').addEventListener('click', () => {
  if (currentScreen === 'viewer') showScreen('project');
  else if (currentScreen === 'project') { showScreen('home'); renderHome(); }
});
 
// ════════════════════════════════════════════════════════
//  HOME RENDER
// ════════════════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('project-grid');
  grid.innerHTML = '';
 
  // New project card
  const newCard = document.createElement('div');
  newCard.className = 'card-new';
  newCard.innerHTML = `
    <div class="plus-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
    <span class="plus-label">NEW PROJECT</span>`;
  newCard.addEventListener('click', openNewProjectModal);
  grid.appendChild(newCard);
 
  // Existing projects (newest first)
  [...projects].reverse().forEach(p => {
    const card = document.createElement('div');
    card.className = 'card-project';
 
    // thumbnail: first image of project
    const thumbImgTag = p.images && p.images.length > 0
      ? `<img src="" data-imgid="${p.images[0].id}" class="lazy-thumb">`
      : `<div class="card-thumb-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C8A96A" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
         </div>`;
 
    const imgCount = p.images ? p.images.length : 0;
    card.innerHTML = `
      <div class="card-thumb">${thumbImgTag}</div>
      <div class="card-info">
        <div class="card-name">${escHtml(p.name)}</div>
        <div class="card-meta">${imgCount} IMAGE${imgCount !== 1 ? 'S' : ''}</div>
      </div>
      <div class="card-del" title="Delete project">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>`;
 
    card.querySelector('.card-del').addEventListener('click', e => {
      e.stopPropagation();
      deleteProject(p.id);
    });
 
    card.addEventListener('click', () => openProject(p.id));
    grid.appendChild(card);
 
    // lazy load thumb
    const lazyImg = card.querySelector('.lazy-thumb');
    if (lazyImg) loadThumb(p.images[0].id, lazyImg);
  });
}
 
async function loadThumb(imageId, imgEl) {
  try {
    const blob = await dbGet(imageId);
    if (blob) {
      const dataURL = await blobToDataURL(blob);
      imgEl.src = dataURL;
    }
  } catch(e) { console.error('loadThumb:', e); }
}
 
// ════════════════════════════════════════════════════════
//  NEW PROJECT MODAL
// ════════════════════════════════════════════════════════
function openNewProjectModal() {
  document.getElementById('new-project-name').value = '';
  document.getElementById('modal-new-project').classList.add('open');
  setTimeout(() => document.getElementById('new-project-name').focus(), 100);
}
function closeNewProjectModal() {
  document.getElementById('modal-new-project').classList.remove('open');
}
document.getElementById('btn-cancel-project').addEventListener('click', closeNewProjectModal);
document.getElementById('new-project-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmNewProject();
});
document.getElementById('btn-confirm-project').addEventListener('click', confirmNewProject);
 
function confirmNewProject() {
  const name = document.getElementById('new-project-name').value.trim();
  if (!name) { toast('Please enter a project name.'); return; }
  const p = { id: uid(), name, images: [], createdAt: Date.now() };
  projects.push(p);
  saveProjects(projects);
  closeNewProjectModal();
  openProject(p.id);
}
 
// ════════════════════════════════════════════════════════
//  PROJECT SCREEN
// ════════════════════════════════════════════════════════
function openProject(id) {
  currentProjectId = id;
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('project-title-input').value = p.name;
  showScreen('project');
  renderProject();
}
 
document.getElementById('project-title-input').addEventListener('input', e => {
  const p = projects.find(x => x.id === currentProjectId);
  if (p) { p.name = e.target.value || 'Untitled'; saveProjects(projects); }
});
 
function renderProject() {
  const p = projects.find(x => x.id === currentProjectId);
  const grid = document.getElementById('image-grid');
  grid.innerHTML = '';
  if (!p) return;
 
  // Add image card
  const addCard = document.createElement('div');
  addCard.className = 'card-add-img';
  addCard.innerHTML = `
    <div class="plus-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
    <span class="plus-label">ADD IMAGE</span>`;
  addCard.addEventListener('click', openAddImageModal);
  grid.appendChild(addCard);
 
  // Image cards
  p.images.forEach(img => {
    const card = document.createElement('div');
    card.className = 'img-card';
    const badgeClass = img.type === '360' ? 'b360' : 'bpano';
    const badgeLabel = img.type === '360' ? '360°' : 'PANO';
    card.innerHTML = `
      <img src="" alt="${escHtml(img.name)}">
      <div class="img-badge ${badgeClass}">${badgeLabel}</div>
      <div class="img-name">${escHtml(img.name)}</div>
      <div class="img-del" title="Remove image">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>`;
 
    card.querySelector('.img-del').addEventListener('click', e => {
      e.stopPropagation();
      deleteImage(img.id);
    });
    const imgIndex = p.images.indexOf(img);
    card.addEventListener('click', () => viewImage(img.id, img.type, imgIndex));
    grid.appendChild(card);
 
    // load thumb
    const imgEl = card.querySelector('img');
    loadThumb(img.id, imgEl);
  });
}
 
document.getElementById('btn-add-image').addEventListener('click', openAddImageModal);
 
// ════════════════════════════════════════════════════════
//  ADD IMAGE MODAL
// ════════════════════════════════════════════════════════
function openAddImageModal() {
  document.getElementById('modal-add-image').classList.add('open');
}
function closeAddImageModal() {
  document.getElementById('modal-add-image').classList.remove('open');
}
document.getElementById('btn-cancel-image').addEventListener('click', closeAddImageModal);
 
document.getElementById('opt-360').addEventListener('click', () => {
  closeAddImageModal();
  document.getElementById('file-360').click();
});
document.getElementById('opt-pano').addEventListener('click', () => {
  closeAddImageModal();
  document.getElementById('file-pano').click();
});
 
document.getElementById('file-360').addEventListener('change', e => handleFileSelect(e, '360'));
document.getElementById('file-pano').addEventListener('change', e => handleFileSelect(e, 'pano'));
 
async function handleFileSelect(e, type) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('Please select an image file.'); return; }
 
  const p = projects.find(x => x.id === currentProjectId);
  if (!p) return;
 
  toast('Saving image…');
  const id = uid();
  try {
    await dbPut(id, file);
    p.images.push({ id, name: file.name, type, addedAt: Date.now() });
    saveProjects(projects);
    renderProject();
    toast('Image added!');
  } catch (err) {
    console.error(err);
    toast('Failed to save image.');
  }
}
 
async function deleteImage(imageId) {
  const p = projects.find(x => x.id === currentProjectId);
  if (!p) return;
  p.images = p.images.filter(i => i.id !== imageId);
  saveProjects(projects);
  try { await dbDel(imageId); } catch {}
  renderProject();
}
 
async function deleteProject(id) {
  const p = projects.find(x => x.id === id);
  if (p && p.images) {
    for (const img of p.images) {
      try { await dbDel(img.id); } catch {}
    }
  }
  projects = projects.filter(x => x.id !== id);
  saveProjects(projects);
  renderHome();
}
 
// ════════════════════════════════════════════════════════
//  VIEWER
// ════════════════════════════════════════════════════════
async function viewImage(imageId, type, index = -1) {
  currentImageIndex = index;
  updateNavButtons();
  teardownViewer();
  showScreen('viewer');
 
  // Let the screen transition finish (250ms) + one paint frame
  await new Promise(r => setTimeout(r, 320));
 
  let blob;
  try { blob = await dbGet(imageId); } catch(e) { console.error(e); }
  if (!blob) { toast('Image not found in storage.'); return; }
 
  // Convert to data URL — more reliable than createObjectURL for IDB blobs
  let dataURL;
  try { dataURL = await blobToDataURL(blob); } catch(e) {
    console.error(e); toast('Failed to read image data.'); return;
  }
 
  const autoBtn = document.getElementById('btn-autorotate');
  const resetBtn = document.getElementById('btn-reset-view');
 
  if (type === '360') {
    document.getElementById('pannellum-container').style.display = 'block';
    document.getElementById('pano-canvas-container').classList.remove('active');
    autoBtn.style.display = '';
    resetBtn.style.display = '';
 
    try {
      pannellumViewer = pannellum.viewer('pannellum-container', {
        type: 'equirectangular',
        panorama: dataURL,
        autoLoad: true,
        showZoomCtrl: false,
        showFullscreenCtrl: false,
        showControls: false,
        hfov: 90, minHfov: 40, maxHfov: 120,
        mouseZoom: true,
        touchPanSpeedCoeffFactor: 1.2,
      });
      pannellumViewer.on('load', () => {
        window.dispatchEvent(new Event('resize'));
        toast('Drag to look around · Pinch to zoom');
      });
      pannellumViewer.on('error', err => {
        console.error('Pannellum:', err);
        toast('Could not render 360° image.');
      });
    } catch(e) {
      console.error('Pannellum init:', e);
      toast('Viewer error — try again.');
    }
 
  } else {
    // Flat infinite-scroll pano viewer
    document.getElementById('pannellum-container').style.display = 'none';
    const container = document.getElementById('pano-canvas-container');
    container.classList.add('active');
    autoBtn.style.display = 'none';
    resetBtn.style.display = '';
 
    // Wait one rAF so the browser paints the container with real dimensions
    await new Promise(r => requestAnimationFrame(r));
 
    const canvas = document.getElementById('pano-canvas');
    const ctx = canvas.getContext('2d');
 
    const image = new Image();
    image.onload = () => {
      panoImg = image;
      fitPano(canvas, container);
      drawPano(canvas, ctx);
      setupPanoInteraction(canvas, ctx, container);
      toast('Drag left/right to scroll · Pinch to zoom');
    };
    image.onerror = (e) => {
      console.error('Image load error:', e);
      toast('Failed to display image.');
    };
    image.src = dataURL;
  }
}
 
function fitPano(canvas, container) {
  const cw = container.clientWidth, ch = container.clientHeight;
  canvas.width = cw; canvas.height = ch;
  const scaleH = ch / panoImg.height;
  // Fit height to canvas; image will be wider than the screen for panning
  panoScale = Math.max(scaleH, cw / panoImg.width);
  // Centre vertically; X starts at 0 (infinite tiling handles wrapping)
  panoOffX = 0;
  panoOffY = (ch - panoImg.height * panoScale) / 2;
  panoVelX = 0; panoVelY = 0;
}
 
function drawPano(canvas, ctx) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!panoImg) return;
  const iw = panoImg.width * panoScale;
  const ih = panoImg.height * panoScale;
  // Tile horizontally: start one tile to the left so the seam is always off-screen
  const startX = panoOffX - iw;
  for (let x = startX; x < canvas.width + iw; x += iw) {
    ctx.drawImage(panoImg, x, panoOffY, iw, ih);
  }
}
 
function clampPano(canvas) {
  // X is free (infinite horizontal wrap) — only clamp Y
  const ih = panoImg.height * panoScale;
  const maxY = Math.min(0, (canvas.height - ih) / 2);
  const minY = canvas.height - ih - Math.max(0, (canvas.height - ih) / 2);
  panoOffY = Math.max(minY, Math.min(maxY, panoOffY));
  // Normalise X into one tile-width range so numbers don't grow forever
  const iw = panoImg.width * panoScale;
  panoOffX = ((panoOffX % iw) + iw) % iw;
}
 
function setupPanoInteraction(canvas, ctx, container) {
  panoAbort = new AbortController();
  const sig = panoAbort.signal;
 
  canvas.addEventListener('mousedown', e => {
    panoIsDragging = true;
    panoDragStart = {x: e.clientX, y: e.clientY};
    panoDragOrigin = {x: panoOffX, y: panoOffY};
    panoVelX = 0; panoVelY = 0;
    panoLastPos = {x: e.clientX, y: e.clientY};
    panoLastTime = Date.now();
    cancelAnimationFrame(panoRaf);
  }, { signal: sig });
 
  window.addEventListener('mousemove', e => {
    if (!panoIsDragging) return;
    const now = Date.now(), dt = now - panoLastTime;
    if (dt > 0) {
      panoVelX = (e.clientX - panoLastPos.x) / dt * 16;
      panoVelY = (e.clientY - panoLastPos.y) / dt * 16;
    }
    panoLastPos = {x: e.clientX, y: e.clientY};
    panoLastTime = now;
    panoOffX = panoDragOrigin.x + (e.clientX - panoDragStart.x);
    panoOffY = panoDragOrigin.y + (e.clientY - panoDragStart.y);
    clampPano(canvas); drawPano(canvas, ctx);
  }, { signal: sig });
 
  window.addEventListener('mouseup', () => {
    if (!panoIsDragging) return;
    panoIsDragging = false;
    startMomentum(canvas, ctx);
  }, { signal: sig });
 
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 0.92;
    const minScale = Math.max(canvas.width / panoImg.width, canvas.height / panoImg.height);
    const newScale = Math.max(minScale, Math.min(panoScale * factor, 8));
    panoOffX = mx - (mx - panoOffX) * (newScale / panoScale);
    panoOffY = my - (my - panoOffY) * (newScale / panoScale);
    panoScale = newScale;
    clampPano(canvas); drawPano(canvas, ctx);
  }, { passive: false, signal: sig });
 
  let lastTouchDist = null, lastTouchMid = null;
  canvas.addEventListener('touchstart', e => {
    cancelAnimationFrame(panoRaf);
    panoVelX = 0; panoVelY = 0;
    if (e.touches.length === 1) {
      panoIsDragging = true;
      panoDragStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      panoDragOrigin = {x: panoOffX, y: panoOffY};
      panoLastPos = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      panoLastTime = Date.now();
    } else if (e.touches.length === 2) {
      panoIsDragging = false;
      lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      lastTouchMid = {x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2};
    }
  }, { passive: true, signal: sig });
 
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && panoIsDragging) {
      const now = Date.now(), dt = now - panoLastTime;
      if (dt > 0) {
        panoVelX = (e.touches[0].clientX - panoLastPos.x) / dt * 16;
        panoVelY = (e.touches[0].clientY - panoLastPos.y) / dt * 16;
      }
      panoLastPos = {x: e.touches[0].clientX, y: e.touches[0].clientY};
      panoLastTime = now;
      panoOffX = panoDragOrigin.x + (e.touches[0].clientX - panoDragStart.x);
      panoOffY = panoDragOrigin.y + (e.touches[0].clientY - panoDragStart.y);
      clampPano(canvas); drawPano(canvas, ctx);
    } else if (e.touches.length === 2 && lastTouchDist !== null) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const mid = {x: (e.touches[0].clientX + e.touches[1].clientX)/2, y: (e.touches[0].clientY + e.touches[1].clientY)/2};
      const factor = dist / lastTouchDist;
      const minScale = Math.max(canvas.width / panoImg.width, canvas.height / panoImg.height);
      const newScale = Math.max(minScale, Math.min(panoScale * factor, 8));
      const rect = canvas.getBoundingClientRect();
      const mx = mid.x - rect.left, my = mid.y - rect.top;
      panoOffX = mx - (mx - panoOffX) * (newScale / panoScale);
      panoOffY = my - (my - panoOffY) * (newScale / panoScale);
      panoScale = newScale;
      lastTouchDist = dist; lastTouchMid = mid;
      clampPano(canvas); drawPano(canvas, ctx);
    }
  }, { passive: false, signal: sig });
 
  canvas.addEventListener('touchend', e => {
    if (e.touches.length === 0) {
      panoIsDragging = false;
      lastTouchDist = null;
      startMomentum(canvas, ctx);
    }
  }, { signal: sig });
 
  window.addEventListener('resize', () => {
    if (currentScreen === 'viewer' && panoImg) {
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      clampPano(canvas); drawPano(canvas, ctx);
    }
  }, { signal: sig });
} // end setupPanoInteraction
 
function startMomentum(canvas, ctx) {
  cancelAnimationFrame(panoRaf);
  function step() {
    if (Math.abs(panoVelX) < 0.1 && Math.abs(panoVelY) < 0.1) return;
    panoOffX += panoVelX; panoOffY += panoVelY;
    panoVelX *= 0.92; panoVelY *= 0.92;
    clampPano(canvas); drawPano(canvas, ctx);
    panoRaf = requestAnimationFrame(step);
  }
  panoRaf = requestAnimationFrame(step);
}
 
function teardownViewer() {
  cancelAnimationFrame(panoRaf);
  // Abort all pano canvas event listeners
  if (panoAbort) { panoAbort.abort(); panoAbort = null; }
  if (pannellumViewer) {
    try { pannellumViewer.destroy(); } catch {}
    pannellumViewer = null;
  }
  // Clear pannellum container so it can be cleanly reused
  const pnContainer = document.getElementById('pannellum-container');
  pnContainer.innerHTML = '';
  pnContainer.style.display = 'block';
  autoRotating = false;
  document.getElementById('btn-autorotate').classList.remove('active');
  panoImg = null;
  panoVelX = 0; panoVelY = 0;
  document.getElementById('pano-canvas-container').classList.remove('active');
  // Clear canvas
  const canvas = document.getElementById('pano-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
 
// ════════════════════════════════════════════════════════
//  NAV BUTTONS
// ════════════════════════════════════════════════════════
function updateNavButtons() {
  const p = projects.find(x => x.id === currentProjectId);
  const total = p ? p.images.length : 0;
  const idx = currentImageIndex;
  const counter = document.getElementById('v-counter');
  const prevBtn = document.getElementById('btn-prev-img');
  const nextBtn = document.getElementById('btn-next-img');
  if (counter) counter.textContent = total > 0 ? `${idx + 1} / ${total}` : '—';
  if (prevBtn) prevBtn.disabled = idx <= 0;
  if (nextBtn) nextBtn.disabled = idx < 0 || idx >= total - 1;
}
 
function navigateImage(dir) {
  const p = projects.find(x => x.id === currentProjectId);
  if (!p || !p.images.length) return;
  const newIdx = currentImageIndex + dir;
  if (newIdx < 0 || newIdx >= p.images.length) return;
  const img = p.images[newIdx];
  viewImage(img.id, img.type, newIdx);
}
 
document.getElementById('btn-prev-img').addEventListener('click', () => navigateImage(-1));
document.getElementById('btn-next-img').addEventListener('click', () => navigateImage(1));
 
// Keyboard arrow navigation
document.addEventListener('keydown', e => {
  if (currentScreen !== 'viewer') return;
  if (e.key === 'ArrowLeft') navigateImage(-1);
  if (e.key === 'ArrowRight') navigateImage(1);
});
 
// VIEWER CONTROLS
document.getElementById('btn-autorotate').addEventListener('click', () => {
  if (!pannellumViewer) return;
  autoRotating = !autoRotating;
  if (autoRotating) { pannellumViewer.startAutoRotate(-2); document.getElementById('btn-autorotate').classList.add('active'); toast('Auto-rotate ON'); }
  else { pannellumViewer.stopAutoRotate(); document.getElementById('btn-autorotate').classList.remove('active'); toast('Auto-rotate OFF'); }
});
document.getElementById('btn-reset-view').addEventListener('click', () => {
  if (pannellumViewer) { pannellumViewer.lookAt(0, 0, 90, 800); return; }
  // pano reset
  const container = document.getElementById('pano-canvas-container');
  const canvas = document.getElementById('pano-canvas');
  const ctx = canvas.getContext('2d');
  if (panoImg) { cancelAnimationFrame(panoRaf); fitPano(canvas, container); drawPano(canvas, ctx); }
});
document.getElementById('btn-fullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => toast('Fullscreen not available'));
  else document.exitFullscreen();
});
document.addEventListener('fullscreenchange', () => {
  document.getElementById('btn-fullscreen').classList.toggle('active', !!document.fullscreenElement);
});
 
// ════════════════════════════════════════════════════════
//  UTILITY
// ════════════════════════════════════════════════════════
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
openDB().then(() => {
  projects = loadProjects();
  renderHome();
}).catch(err => {
  console.error('IndexedDB failed:', err);
  projects = loadProjects();
  renderHome();
  toast('Storage unavailable — images won\'t persist.');
});
</script>
